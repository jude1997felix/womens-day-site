<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
overflow:hidden;
}

.container{
text-align:center;
color:white;
padding:20px;
}

h1{
font-size:3rem;
animation:fadeIn 2s ease;
}

button{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#e84393;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

#message{
display:none;
margin-top:20px;
font-size:1.3rem;
max-width:600px;
line-height:1.6;
}

.flower{
position:absolute;
font-size:22px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}

@media (max-width:600px){
h1{
font-size:2.2rem;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Women's Day 🌸</h1>

<button onclick="showMessage()">Click to Celebrate Women</button>

<div id="message">
Today we celebrate the strength, courage, and kindness of women everywhere.<br><br>

Women shape families, communities, science, art, and the future itself.<br><br>

May today be a reminder that your voice matters, your ideas matter,
and the world becomes better because you are in it.
</div>

</div>

<script>

function showMessage(){
const msg = document.getElementById("message");
msg.style.display="block";
msg.style.opacity="0";
msg.style.transition="opacity 1.5s";
setTimeout(()=>{msg.style.opacity="1"},100);
}

function createFlower(){
const flower=document.createElement("div");
flower.classList.add("flower");
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=(Math.random()*20+15)+"px";
flower.style.animationDuration=(Math.random()*4+4)+"s";
document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},7000);
}

setInterval(createFlower,500);

</script>

</body>
</html>
